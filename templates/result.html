<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="crop">

<div class="topnav">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/findyourcrop">Find Your Crop</a>
</div>

<div class="overlay">

    <div class="content">

        <h1>🌱 Crop Prediction Result</h1>

        <h2 style="color:green;">
            Recommended Crop: {{ prediction }}
        </h2>

        <br>

        <table style="margin:auto;font-size:20px;">
            <tr><td><b>Nitrogen</b></td><td>{{ N }}</td></tr>
            <tr><td><b>Phosphorous</b></td><td>{{ P }}</td></tr>
            <tr><td><b>Potassium</b></td><td>{{ K }}</td></tr>
            <tr><td><b>Temperature</b></td><td>{{ temperature }}</td></tr>
            <tr><td><b>Humidity</b></td><td>{{ humidity }}</td></tr>
            <tr><td><b>pH</b></td><td>{{ ph }}</td></tr>
            <tr><td><b>Rainfall</b></td><td>{{ rainfall }}</td></tr>
        </table>

        <br><br>

        <a href="/findyourcrop">
            <button>Predict Another Crop</button>
        </a>

    </div>

</div>

</body>
</html>
